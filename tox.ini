[tox]
description = Default tox environments list
envlist =
    style,{py37,py38,py39,py310,py311}{,-coverage},doc
skip_missing_interpreters = true
isolated_build = true

[testenv]
description = Checks for project unit tests and coverage (if desired)
basepython =
    py310: python3.10
    py311: python3.11
    py312: python3.12
    py313: python3.13
    py: python3
    {style,reformat,doc}: python3
skip_install = true
allowlist_externals =
    poetry
setenv =
    PYTHONUNBUFFERED = yes
    coverage: PYTEST_EXTRA_ARGS = --cov=ansys.conceptev --cov-report=term --cov-report=xml:.cov/xml --cov-report=html:.cov/html
commands =poetry install
    poetry run pytest {env:PYTEST_MARKERS:} {env:PYTEST_EXTRA_ARGS:} {posargs:-vv}

[testenv:style]
description = Checks project code style
skip_install = true
deps =
    pre-commit
commands =
    pre-commit install
    pre-commit run --all-files --show-diff-on-failure

[testenv:doc]
description = Check if documentation generates properly
skip_install = true
allowlist_externals =
    poetry
commands =
    poetry install --with doc
    poetry run sphinx-build -d "{toxworkdir}/doc_doctree" doc/source "{toxinidir}/_build/html" --color -vW -bhtml

[testenv:codegen]
description = Regenerate the API client from the committed spec and fail if the result differs
skip_install = true
allowlist_externals =
    poetry
    git
commands =
    poetry install --with build
    # Regenerate from the committed openapi_v2.json (--no-export skips the network call)
    poetry run python scripts/generate_client.py --no-export
    # Fail if the regenerated code differs from what is committed
    git diff --exit-code src/ansys/conceptev/core/generated/
