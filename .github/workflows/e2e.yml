name: E2E Tests (manual)

on:
  workflow_dispatch:
    inputs:
      python-version:
        description: "Python version"
        required: false
        default: "3.12"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    permissions:
      packages: read # Needed to pull the optiSLang container image from ghcr.io
    container:
      image: ghcr.io/ansys/optislang:25.2.0-jammy@sha256:e2ee15479dc58413b37699fdbdbd60d551a31916b556d6dda74c3ed3dc0f7783
      credentials:
        username: ansys-bot
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install dependencies
        # Use the container's own Python (3.10 built for Ubuntu 22.04/GLIBC 2.35).
        # The runner tool-cache Python binaries require GLIBC 2.38 and cannot run
        # inside this jammy container. pip is not pre-installed in the optiSLang image.
        run: |
          apt-get update
          apt-get install -y python3-pip
          python3 -m pip install --quiet poetry
          poetry install --with tests
      - name: Run e2e tests
        env:
          PYOPTISLANG_DISABLE_OPTISLANG_OUTPUT: true
          ANSYSLMD_LICENSE_FILE: ${{ format('1055@{0}', secrets.LICENSE_SERVER) }}
          CONCEPTEV_PASSWORD: ${{ secrets.CONCEPTEV_PASSWORD }}
          PYCONCEPTEV_SETTINGS: "tests/e2e/config.toml"
          POETRY_VIRTUALENVS_CREATE: "false"
        run: poetry run pytest tests/e2e -vv
