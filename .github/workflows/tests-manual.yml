name: Tests (Manual Trigger)
# Trigger integration and e2e tests manually from a Codespace or CLI
# without needing to expose repository secrets locally.
#
# Usage from inside a Codespace (or any machine with gh CLI):
#
#   gh workflow run tests-manual.yml --ref <your-branch>
#   gh workflow run tests-manual.yml --ref <your-branch> -f suite=integration
#   gh workflow run tests-manual.yml --ref <your-branch> -f suite=e2e
#   gh workflow run tests-manual.yml --ref <your-branch> -f suite=all -f pytest_args="-k test_name"
#
#   gh run watch   # stream live output
#   gh run view --log   # view completed log

on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Test suite to run"
        required: true
        default: "e2e"
        type: choice
        options:
          - e2e
          - integration
          - all
      pytest_args:
        description: "Extra pytest arguments (e.g. -k test_name -v)"
        required: false
        default: ""

env:
  MAIN_PYTHON_VERSION: '3.14'

permissions: {}

jobs:

  tests-integration:
    name: Integration Tests
    if: ${{ inputs.suite == 'integration' || inputs.suite == 'all' }}
    runs-on: ubuntu-latest
    steps:
      - uses: ansys/actions/tests-pytest@7d55ff0b9f67c77dae50a286d711ee1ae27b0a25 # v10.2.12
        env:
          PYCONCEPTEV_SETTINGS: "tests/integration/config.toml"
          CONCEPTEV_PASSWORD: ${{ secrets.CONCEPTEV_PASSWORD }}
          POETRY_VIRTUALENVS_CREATE: ${{ vars.POETRY_VIRTUALENVS_CREATE }}
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          pytest-extra-args: "tests/integration ${{ inputs.pytest_args }}"

  tests-e2e:
    name: E2E Tests
    if: ${{ inputs.suite == 'e2e' || inputs.suite == 'all' }}
    runs-on: ubuntu-latest
    container:
      image: ${{ format('ghcr.io/ansys/optislang:{0}-jammy', '25.2.0') }}
      credentials:
        username: ansys-bot
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: "Pytest"
        env:
          PYOPTISLANG_DISABLE_OPTISLANG_OUTPUT: true
          ANSYSLMD_LICENSE_FILE: ${{ format('1055@{0}', secrets.LICENSE_SERVER) }}
          POETRY_VIRTUALENVS_CREATE: ${{ vars.POETRY_VIRTUALENVS_CREATE }}
          CONCEPTEV_PASSWORD: ${{ secrets.CONCEPTEV_PASSWORD }}
          PYCONCEPTEV_SETTINGS: "tests/e2e/config.toml"
        uses: ansys/actions/tests-pytest@v10
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          pytest-extra-args: "tests/e2e ${{ inputs.pytest_args }}"
